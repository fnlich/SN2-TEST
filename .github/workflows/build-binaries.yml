name: Build Platform Binaries

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out
        type: string
        default: ""
      release-channel:
        description: SN2_RELEASE_CHANNEL value (empty or mainnet)
        type: string
        default: ""
      macos-runner:
        description: macOS runner label
        type: string
        default: "macos-15"

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libudev-dev protobuf-compiler python3-dev mold
          mold --version
          protoc --version

      - name: Install toolchain from rust-toolchain.toml
        run: rustup show

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-registry-${{ hashFiles('Cargo.lock') }}-${{ matrix.arch }}

      - name: Pre-fetch dependencies for offline lockfile sync
        if: startsWith(inputs.ref || github.ref, 'refs/tags/')
        run: cargo fetch --locked

      - name: Set crate versions
        if: startsWith(inputs.ref || github.ref, 'refs/tags/')
        uses: inference-labs-inc/set-toml-version@ff9a4b64df4ce91067737822d2811a69597bf688 # v1
        with:
          files: |
            crates/sn2-types/Cargo.toml
            crates/sn2-chain/Cargo.toml
            crates/sn2-verify/Cargo.toml
            crates/sn2-circuit-store/Cargo.toml
            crates/sn2-validator/Cargo.toml
            crates/sn2-miner/Cargo.toml

      - name: Sync lockfile after version injection
        if: startsWith(inputs.ref || github.ref, 'refs/tags/')
        run: cargo update -w --offline

      - name: Build release binaries
        run: cargo build --release --locked --bin sn2-validator --bin sn2-miner
        env:
          SCCACHE_GHA_VERSION: ${{ hashFiles('Cargo.lock') }}
          PYO3_PYTHON: python3
          SN2_RELEASE_CHANNEL: ${{ inputs.release-channel }}
          OPENSSL_NO_VENDOR: "1"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Show sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Rename binaries
        run: |
          cp target/release/sn2-validator sn2-validator-linux-${{ matrix.arch }}
          cp target/release/sn2-miner sn2-miner-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: |
            sn2-validator-linux-${{ matrix.arch }}
            sn2-miner-linux-${{ matrix.arch }}

  build-macos:
    name: Build macOS aarch64
    runs-on: ${{ inputs.macos-runner }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Assert aarch64 runner
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" != "arm64" ]; then
            echo "FAIL: Expected arm64 runner, got $ARCH" >&2
            exit 1
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: setup-python
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: brew install protobuf

      - name: Install toolchain from rust-toolchain.toml
        run: rustup show

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-aarch64-registry-${{ hashFiles('Cargo.lock') }}

      - name: Pre-fetch dependencies for offline lockfile sync
        if: startsWith(inputs.ref || github.ref, 'refs/tags/')
        run: cargo fetch --locked

      - name: Set crate versions
        if: startsWith(inputs.ref || github.ref, 'refs/tags/')
        uses: inference-labs-inc/set-toml-version@ff9a4b64df4ce91067737822d2811a69597bf688 # v1
        with:
          files: |
            crates/sn2-types/Cargo.toml
            crates/sn2-chain/Cargo.toml
            crates/sn2-verify/Cargo.toml
            crates/sn2-circuit-store/Cargo.toml
            crates/sn2-validator/Cargo.toml
            crates/sn2-miner/Cargo.toml

      - name: Sync lockfile after version injection
        if: startsWith(inputs.ref || github.ref, 'refs/tags/')
        run: cargo update -w --offline

      - name: Build release binaries
        run: cargo build --release --locked --bin sn2-validator --bin sn2-miner
        env:
          SCCACHE_GHA_VERSION: ${{ hashFiles('Cargo.lock') }}
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
          SN2_RELEASE_CHANNEL: ${{ inputs.release-channel }}

      - name: Show sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Rename binaries
        run: |
          cp target/release/sn2-validator sn2-validator-macos-aarch64
          cp target/release/sn2-miner sn2-miner-macos-aarch64

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-macos-aarch64
          path: |
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
