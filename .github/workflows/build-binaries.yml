name: Build Platform Binaries

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out
        type: string
        default: ""
      release-channel:
        description: SN2_RELEASE_CHANNEL value (empty or mainnet)
        type: string
        default: ""
      version:
        description: SN2_VERSION value
        type: string
        default: ""
      macos-runner:
        description: macOS runner label
        type: string
        default: "macos-15"

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libudev-dev protobuf-compiler python3-dev mold
          mold --version
          protoc --version

      - name: Install toolchain from rust-toolchain.toml
        run: rustup show

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-registry-${{ hashFiles('Cargo.lock') }}-${{ matrix.arch }}
          restore-keys: |
            linux-registry-${{ hashFiles('Cargo.lock') }}-
            linux-registry-

      - name: Build release binaries
        run: cargo build --release --locked --bin sn2-validator --bin sn2-miner
        env:
          PYO3_PYTHON: python3
          SN2_RELEASE_CHANNEL: ${{ inputs.release-channel }}
          SN2_VERSION: ${{ inputs.version }}
          OPENSSL_NO_VENDOR: "1"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Show sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Rename binaries
        run: |
          cp target/release/sn2-validator sn2-validator-linux-${{ matrix.arch }}
          cp target/release/sn2-miner sn2-miner-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: |
            sn2-validator-linux-${{ matrix.arch }}
            sn2-miner-linux-${{ matrix.arch }}

  build-macos:
    name: Build macOS aarch64
    runs-on: ${{ inputs.macos-runner }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Assert aarch64 runner
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" != "arm64" ]; then
            echo "FAIL: Expected arm64 runner, got $ARCH" >&2
            exit 1
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: setup-python
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: brew install protobuf

      - name: Install toolchain from rust-toolchain.toml
        run: rustup show

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-aarch64-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-aarch64-registry-

      - name: Build release binaries
        run: cargo build --release --locked --bin sn2-validator --bin sn2-miner
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
          SN2_RELEASE_CHANNEL: ${{ inputs.release-channel }}
          SN2_VERSION: ${{ inputs.version }}

      - name: Show sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Rename binaries
        run: |
          cp target/release/sn2-validator sn2-validator-macos-aarch64
          cp target/release/sn2-miner sn2-miner-macos-aarch64

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-macos-aarch64
          path: |
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
