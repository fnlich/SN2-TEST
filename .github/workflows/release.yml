name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
    branches: [testnet]
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  security-gate:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/testnet'
    uses: ./.github/workflows/security.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  build:
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.pull_request.labels.*.name, 'run-build') || github.ref == 'refs/heads/testnet'
    uses: ./.github/workflows/build-binaries.yml
    with:
      release-channel: ${{ startsWith(github.ref, 'refs/tags/') && 'mainnet' || '' }}

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, security-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-release

      - name: Generate SHA256SUMS
        run: sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-linux-aarch64 sn2-miner-linux-aarch64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 sbom.cdx.json > SHA256SUMS

      - name: Attest release binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SHA256SUMS with cosign keyless
        run: cosign sign-blob --yes --bundle SHA256SUMS.sigstore.json SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS
            SHA256SUMS.sigstore.json
            sbom.cdx.json

  release-testnet:
    name: Create Testnet Release
    if: github.ref == 'refs/heads/testnet'
    needs: [build, security-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-linux-aarch64 sn2-miner-linux-aarch64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Attest release binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SHA256SUMS with cosign keyless
        run: cosign sign-blob --yes --bundle SHA256SUMS.sigstore.json SHA256SUMS

      - name: Create Testnet Release
        run: |
          TAG="testnet-$(echo ${{ github.sha }} | cut -c1-8)"
          gh release create "$TAG" \
            --title "Testnet ($TAG)" \
            --notes "Built from ${{ github.sha }}" \
            --prerelease \
            --target testnet \
            sn2-validator-linux-x86_64 \
            sn2-miner-linux-x86_64 \
            sn2-validator-linux-aarch64 \
            sn2-miner-linux-aarch64 \
            sn2-validator-macos-aarch64 \
            sn2-miner-macos-aarch64 \
            SHA256SUMS \
            SHA256SUMS.sigstore.json
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
