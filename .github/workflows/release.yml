name: Release

on:
  push:
    tags: ["*.*.*"]
    branches: [testnet]
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux x86_64
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.pull_request.labels.*.name, 'run-build') || github.ref == 'refs/heads/testnet'
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          dnf install -y clang llvm-devel pkg-config openssl-devel libudev-devel protobuf-compiler python3.12-devel perl-core
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-release-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: linux-x86_64-release-

      - name: Build release binaries
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --locked --bin sn2-validator --bin sn2-miner
        env:
          PYO3_PYTHON: /usr/bin/python3.12
          SN2_RELEASE_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/') && 'mainnet' || '' }}
          SN2_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.sha) }}

      - name: Rename binaries
        run: |
          cp target/release/sn2-validator sn2-validator-linux-x86_64
          cp target/release/sn2-miner sn2-miner-linux-x86_64

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-linux-x86_64
          path: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64

  build-macos:
    name: Build macOS aarch64
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.pull_request.labels.*.name, 'run-build') || github.ref == 'refs/heads/testnet'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: setup-python
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: brew install protobuf

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-aarch64-release-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: macos-aarch64-release-

      - name: Build release binaries
        run: cargo build --release --locked --bin sn2-validator --bin sn2-miner
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
          SN2_RELEASE_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/') && 'mainnet' || '' }}
          SN2_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.sha) }}

      - name: Rename binaries
        run: |
          cp target/release/sn2-validator sn2-validator-macos-aarch64
          cp target/release/sn2-miner sn2-miner-macos-aarch64

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-macos-aarch64
          path: |
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS

  release-testnet:
    name: Create Testnet Release
    if: github.ref == 'refs/heads/testnet'
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove previous testnet release
        run: gh release delete testnet-latest --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Create Testnet Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: testnet-latest
          name: Testnet (latest)
          body: "Built from ${{ github.sha }}"
          prerelease: true
          make_latest: false
          target_commitish: testnet
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS
