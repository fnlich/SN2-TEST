name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
    branches: [testnet]
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.pull_request.labels.*.name, 'run-build') || github.ref == 'refs/heads/testnet'
    uses: ./.github/workflows/build-binaries.yml
    with:
      release-channel: ${{ startsWith(github.ref, 'refs/tags/') && 'mainnet' || '' }}

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Collect binaries and generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-linux-aarch64 sn2-miner-linux-aarch64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-release

      - name: Attest Linux binaries
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS
            sbom.cdx.json

  release-testnet:
    name: Create Testnet Release
    if: github.ref == 'refs/heads/testnet'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove previous testnet release
        run: gh release delete testnet-latest --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-linux-aarch64 sn2-miner-linux-aarch64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Create Testnet Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: testnet-latest
          name: Testnet (latest)
          body: "Built from ${{ github.sha }}"
          prerelease: true
          make_latest: false
          target_commitish: testnet
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS
