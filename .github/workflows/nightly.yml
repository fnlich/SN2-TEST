name: Nightly loopback integration

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: nightly-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subnet-2
  CARGO_TERM_COLOR: always

jobs:
  loopback-e2e:
    name: Loopback E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: testnet

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config libssl-dev libudev-dev protobuf-compiler

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nightly-

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Get year-month for circuit cache key
        run: echo "YEARMONTH=$(date +'%Y-%m')" >> $GITHUB_ENV

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bittensor/subnet-2/circuit_cache
          key: circuit-${{ runner.os }}-${{ env.YEARMONTH }}
          restore-keys: circuit-${{ runner.os }}-

      - name: Seed test circuit
        id: seed
        run: |
          CIRCUIT_ID=$(python tools/ci_loopback_seed.py)
          echo "circuit_id=${CIRCUIT_ID}" >> $GITHUB_OUTPUT
          echo "Seeded circuit: ${CIRCUIT_ID}"

      - name: Start mock circuit API
        run: python tools/mock_circuit_api.py 18080 &

      - name: Wait for mock circuit API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:18080/circuits > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:18080/circuits > /dev/null || \
            (echo "Mock API failed to start" && exit 1)

      - name: Activate test circuit
        run: |
          RESULT=$(curl -sf -X POST \
            "http://localhost:18080/admin/activate/${{ steps.seed.outputs.circuit_id }}")
          echo "Activate response: $RESULT"
          echo "$RESULT" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); sys.exit(0 if 'activated' in d else 1)"

      - name: Start miner in loopback
        run: |
          ./target/release/sn2-miner \
            --loopback \
            --axon-port 8091 \
            --log-level info \
            > /tmp/miner.log 2>&1 &
          echo "MINER_PID=$!" >> $GITHUB_ENV

      - name: Wait for miner
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8091/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:8091/health || \
            (echo "Miner failed to start" && tail -50 /tmp/miner.log && exit 1)

      - name: Start validator in loopback
        run: |
          mkdir -p ~/.bittensor/subnet-2
          ./target/release/sn2-validator \
            --loopback \
            --miner-address 127.0.0.1:8091 \
            --circuit-api-url http://localhost:18080 \
            --metrics-port 9090 \
            --max-concurrency 4 \
            --log-level info \
            > /tmp/validator.log 2>&1 &
          echo "VALIDATOR_PID=$!" >> $GITHUB_ENV

      - name: Wait for validator metrics endpoint
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:9090/metrics > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:9090/metrics > /dev/null || \
            (echo "Validator metrics endpoint unavailable" && tail -50 /tmp/validator.log && exit 1)

      - name: Run for 6 minutes
        run: sleep 360

      - name: Assert process liveness
        run: |
          kill -0 $MINER_PID 2>/dev/null || \
            (echo "FAIL: Miner exited early" && tail -100 /tmp/miner.log && exit 1)
          kill -0 $VALIDATOR_PID 2>/dev/null || \
            (echo "FAIL: Validator exited early" && tail -100 /tmp/validator.log && exit 1)

      - name: Assert metrics
        run: |
          METRICS=$(curl -sf http://localhost:9090/metrics)

          SENT=$(echo "$METRICS" | awk '/^sn2_requests_sent_total/ {sum += $NF} END {print int(sum+0)}')
          echo "Requests sent: ${SENT}"
          [[ "${SENT:-0}" -ge 2 ]] || \
            (echo "FAIL: Expected >= 2 requests sent, got ${SENT:-0}" && exit 1)

          SUCCESSES=$(echo "$METRICS" | awk '/sn2_responses_total\{.*success/ {sum += int($NF+0)} END {print int(sum+0)}')
          FAILURES=$(echo "$METRICS"  | awk '/sn2_responses_total\{.*failure/ {sum += int($NF+0)} END {print int(sum+0)}')
          TOTAL=$(( ${SUCCESSES:-0} + ${FAILURES:-0} ))
          echo "Responses: ${SUCCESSES:-0} success, ${FAILURES:-0} failure (${TOTAL} total)"

          [[ "${TOTAL}" -ge 2 ]] || \
            (echo "FAIL: Expected >= 2 total responses, got ${TOTAL}" && exit 1)

          if [[ "$TOTAL" -gt 0 ]]; then
            SUCCESS_PCT=$(( ${SUCCESSES:-0} * 100 / TOTAL ))
            echo "Success rate: ${SUCCESS_PCT}%"
            [[ "$SUCCESS_PCT" -ge 50 ]] || \
              (echo "FAIL: Success rate ${SUCCESS_PCT}% < 50%" && exit 1)
          fi

      - name: Shutdown validator
        run: |
          kill -INT $VALIDATOR_PID
          for i in $(seq 1 20); do
            kill -0 $VALIDATOR_PID 2>/dev/null || break
            sleep 1
          done

      - name: Shutdown miner
        run: |
          kill -INT $MINER_PID
          for i in $(seq 1 20); do
            kill -0 $MINER_PID 2>/dev/null || break
            sleep 1
          done

      - name: Assert scoring
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          path = os.path.expanduser("~/.bittensor/subnet-2/scores.json")
          try:
              scores = json.loads(open(path).read())
          except Exception as e:
              print(f"FAIL: Cannot read scores.json: {e}", file=sys.stderr)
              sys.exit(1)
          score = float(scores.get("0", 0))
          if score <= 0:
              print(f"FAIL: UID 0 score {score:.8f} is not positive", file=sys.stderr)
              sys.exit(1)
          print(f"UID 0 score: {score:.8f}")
          PYEOF

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== VALIDATOR LOG (last 200 lines) ==="
          tail -200 /tmp/validator.log || true
          echo "=== MINER LOG (last 100 lines) ==="
          tail -100 /tmp/miner.log || true
          echo "=== SCORES ==="
          cat ~/.bittensor/subnet-2/scores.json 2>/dev/null || echo "(not found)"
          echo "=== PERFORMANCE TRACKER ==="
          cat ~/.bittensor/subnet-2/performance_tracker.json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d, indent=2))" 2>/dev/null || echo "(not found)"
          echo "=== METRICS ==="
          curl -sf http://localhost:9090/metrics 2>/dev/null || echo "(unavailable)"

  build:
    uses: ./.github/workflows/build-binaries.yml
    with:
      ref: testnet

  publish-nightly:
    name: Publish testnet-nightly
    needs: [loopback-e2e, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: testnet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :testnet-nightly
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:testnet-nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image with Trivy
        id: trivy-scan
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:testnet-nightly
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy image scan to GitHub Security tab
        if: ${{ steps.trivy-scan.conclusion == 'success' }}
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3.28.19
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image-nightly

      - name: Attest provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-nightly:
    name: Nightly GitHub Release
    needs: [loopback-e2e, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Remove previous nightly release
        run: gh release delete testnet-nightly --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Set build timestamp
        id: ts
        run: echo "timestamp=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: Create Nightly Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: testnet-nightly
          name: Testnet Nightly
          body: |
            E2E-validated nightly build from `testnet` at ${{ github.sha }}.
            Built: ${{ steps.ts.outputs.timestamp }}
          prerelease: true
          make_latest: false
          target_commitish: testnet
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS
