name: Nightly build and smoke test

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}
  pull_request:
    types: [labeled, synchronize, reopened]

concurrency:
  group: nightly-${{ github.event.pull_request.number || 'publish' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subnet-2
  CARGO_TERM_COLOR: always

jobs:
  smoke-test:
    name: Smoke test
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'test-nightly')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || 'testnet' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libudev-dev protobuf-compiler mold

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Build release binaries
        run: cargo build --workspace --release --locked
        env:
          OPENSSL_NO_VENDOR: "1"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold

      - name: Start miner in loopback
        run: |
          ./target/release/sn2-miner \
            --loopback \
            --axon-port 8091 \
            --log-level info \
            > /tmp/miner.log 2>&1 &
          echo "MINER_PID=$!" >> $GITHUB_ENV

      - name: Wait for miner health
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8091/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:8091/health || \
            (echo "FAIL: Miner health endpoint unreachable" && tail -50 /tmp/miner.log && exit 1)

      - name: Start validator in loopback
        run: |
          mkdir -p ~/.bittensor/subnet-2
          ./target/release/sn2-validator \
            --loopback \
            --miner-address 127.0.0.1:8091 \
            --circuit-api-url https://repository.inferencelabs.com \
            --metrics-port 9090 \
            --max-concurrency 4 \
            --log-level info \
            > /tmp/validator.log 2>&1 &
          echo "VALIDATOR_PID=$!" >> $GITHUB_ENV

      - name: Wait for validator metrics endpoint
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:9090/metrics > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:9090/metrics > /dev/null || \
            (echo "FAIL: Validator metrics endpoint unreachable" && tail -50 /tmp/validator.log && exit 1)

      - name: Assert circuits loaded
        run: |
          for i in $(seq 1 30); do
            grep -q "validator loop starting" /tmp/validator.log && break
            sleep 1
          done
          grep "validator loop starting" /tmp/validator.log || \
            (echo "FAIL: Validator did not complete circuit loading" && tail -50 /tmp/validator.log && exit 1)
          grep "circuits loaded" /tmp/validator.log | tail -1

      - name: Stability window
        run: sleep 30

      - name: Assert process liveness
        run: |
          kill -0 $MINER_PID 2>/dev/null || \
            (echo "FAIL: Miner exited during stability window" && tail -100 /tmp/miner.log && exit 1)
          kill -0 $VALIDATOR_PID 2>/dev/null || \
            (echo "FAIL: Validator exited during stability window" && tail -100 /tmp/validator.log && exit 1)

      - name: Assert metrics endpoint responsive
        run: |
          METRICS=$(curl -sf http://localhost:9090/metrics)
          echo "$METRICS" | head -20
          echo "$METRICS" | grep -q "^sn2_" || \
            (echo "FAIL: No sn2_ metrics found" && exit 1)

      - name: Shutdown validator
        if: always()
        run: |
          kill -INT $VALIDATOR_PID
          for i in $(seq 1 20); do
            kill -0 $VALIDATOR_PID 2>/dev/null || break
            sleep 1
          done
          kill -0 $VALIDATOR_PID 2>/dev/null && \
            (echo "WARN: Validator did not exit on SIGINT, sending SIGKILL" && kill -9 $VALIDATOR_PID) || true

      - name: Shutdown miner
        if: always()
        run: |
          kill -INT $MINER_PID
          for i in $(seq 1 20); do
            kill -0 $MINER_PID 2>/dev/null || break
            sleep 1
          done
          kill -0 $MINER_PID 2>/dev/null && \
            (echo "WARN: Miner did not exit on SIGINT, sending SIGKILL" && kill -9 $MINER_PID) || true

      - name: Dump logs
        if: always()
        run: |
          echo "=== VALIDATOR LOG (last 200 lines) ==="
          tail -200 /tmp/validator.log || true
          echo "=== MINER LOG (last 100 lines) ==="
          tail -100 /tmp/miner.log || true

  build:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/build-binaries.yml
    with:
      ref: testnet

  publish-nightly:
    name: Publish testnet-nightly
    if: github.event_name != 'pull_request'
    needs: [smoke-test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: testnet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :testnet-nightly
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:testnet-nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image with Trivy
        id: trivy-scan
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:testnet-nightly
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy image scan to GitHub Security tab
        if: ${{ steps.trivy-scan.conclusion == 'success' }}
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3.28.19
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image-nightly

      - name: Attest provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-nightly:
    name: Nightly GitHub Release
    if: github.event_name != 'pull_request'
    needs: [smoke-test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Remove previous nightly release
        run: gh release delete testnet-nightly --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name 'sn2-*' -exec cp {} ../ \;
          cd ..
          sha256sum sn2-validator-linux-x86_64 sn2-miner-linux-x86_64 sn2-validator-linux-aarch64 sn2-miner-linux-aarch64 sn2-validator-macos-aarch64 sn2-miner-macos-aarch64 > SHA256SUMS

      - name: Set build timestamp
        id: ts
        run: echo "timestamp=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: Create Nightly Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: testnet-nightly
          name: Testnet Nightly
          body: |
            Smoke-tested nightly build from `testnet` at ${{ github.sha }}.
            Built: ${{ steps.ts.outputs.timestamp }}
          prerelease: true
          make_latest: false
          target_commitish: testnet
          files: |
            sn2-validator-linux-x86_64
            sn2-miner-linux-x86_64
            sn2-validator-linux-aarch64
            sn2-miner-linux-aarch64
            sn2-validator-macos-aarch64
            sn2-miner-macos-aarch64
            SHA256SUMS
