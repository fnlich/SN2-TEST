#https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-docker-images#publishing-images-to-github-packages
name: Create and publish a Docker image

on:
  push:
    branches:
      - testnet
  pull_request:
    types: [labeled, synchronize]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/subnet-2

jobs:
  build-dev:
    if: github.event_name != 'workflow_run' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-build'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image for testnet branch
        id: push-testnet
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          target: dev
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            SN2_VERSION=
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan testnet container image with Trivy
        if: github.event_name == 'push'
        id: trivy-scan-testnet
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy testnet image scan to GitHub Security tab
        if: ${{ steps.trivy-scan-testnet.conclusion == 'success' }}
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image-testnet

      - name: Generate artifact attestation for testnet
        if: github.event_name == 'push'
        id: attest-testnet
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push-testnet.outputs.digest }}
          push-to-registry: true

  build-release:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_branch != 'testnet'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write

    env:
      RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Validate release ref
        run: |
          if ! echo "${{ github.event.workflow_run.head_branch }}" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Unexpected head_branch: ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Download release binaries
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release download "$RELEASE_TAG" \
              --pattern 'sn2-validator-linux-x86_64' \
              --pattern 'sn2-miner-linux-x86_64' \
              --dir .; then
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "Failed to download release assets after 5 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify binary attestations
        run: |
          gh attestation verify sn2-validator-linux-x86_64 --repo "${{ github.repository }}"
          gh attestation verify sn2-miner-linux-x86_64 --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare binaries for Docker context
        run: |
          mv sn2-validator-linux-x86_64 sn2-validator
          mv sn2-miner-linux-x86_64 sn2-miner

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image for release
        id: push-release
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          target: release
          pull: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan release container image with Trivy
        id: trivy-scan-release
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy release image scan to GitHub Security tab
        if: ${{ steps.trivy-scan-release.conclusion == 'success' }}
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image-release

      - name: Generate artifact attestation for release
        id: attest-release
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push-release.outputs.digest }}
          push-to-registry: true
