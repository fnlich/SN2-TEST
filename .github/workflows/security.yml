name: Security Analysis

on:
  push:
    branches: [main, testnet]
  pull_request:
    branches: [main, testnet]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --json > cargo-audit-results.json

      - name: Upload Audit Results
        uses: actions/upload-artifact@v5
        with:
          name: cargo-audit-results
          path: cargo-audit-results.json

  semgrep:
    name: Semgrep Static Analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          semgrep --config=auto \
            --json --output=semgrep-results.json \
            --error || true
          semgrep --config=auto \
            --sarif --output=semgrep-results.sarif \
            || true

      - name: Upload Semgrep Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: semgrep-results
          path: |
            semgrep-results.json
            semgrep-results.sarif
          if-no-files-found: ignore

      - name: Upload SARIF results to GitHub
        if: hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  trivy:
    name: Trivy Security Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          skip-dirs: "/lib/modules,/boot,/usr/src/kernels,target"
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "repo"
          scan-ref: "."
          format: "json"
          output: "trivy-results.json"

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v5
        with:
          name: trivy-results
          path: trivy-results.json

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979

  secrets-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: TruffleHog OSS (Pull Request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@cbdff3fa9cf5e46d9a78c0d3ab6374f7f5e89334
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@cbdff3fa9cf5e46d9a78c0d3ab6374f7f5e89334
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Schedule)
        if: github.event_name == 'schedule'
        uses: trufflesecurity/trufflehog@cbdff3fa9cf5e46d9a78c0d3ab6374f7f5e89334
        with:
          path: ./
          extra_args: --debug --only-verified

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, semgrep, trivy, secrets-detection]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Create Security Summary
        run: |
          echo "# Security Analysis Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Job Results" >> security-summary.md
          echo "- Cargo Audit: ${{ needs.cargo-audit.result }}" >> security-summary.md
          echo "- Cargo Deny: ${{ needs.cargo-deny.result }}" >> security-summary.md
          echo "- Semgrep: ${{ needs.semgrep.result }}" >> security-summary.md
          echo "- Trivy: ${{ needs.trivy.result }}" >> security-summary.md
          echo "- Secrets Detection: ${{ needs.secrets-detection.result }}" >> security-summary.md

      - name: Upload Security Summary
        uses: actions/upload-artifact@v5
        with:
          name: security-summary
          path: security-summary.md
