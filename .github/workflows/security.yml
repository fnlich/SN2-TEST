name: Security Analysis

on:
  push:
    branches: [main, testnet]
  pull_request:
    branches: [main, testnet]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.21.2"

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version ${{ env.CARGO_AUDIT_VERSION }} --locked

      - name: Run cargo audit
        run: cargo audit --json > cargo-audit-results.json

      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-audit-results
          path: cargo-audit-results.json

  semgrep:
    name: Semgrep Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep
        run: |
          semgrep --config=auto \
            --json --output=semgrep-results.json \
            --error

      - name: Generate SARIF report
        if: always()
        run: |
          semgrep --config=auto \
            --sarif --output=semgrep-results.sarif \
            || true

      - name: Upload Semgrep Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: semgrep-results
          path: |
            semgrep-results.json
            semgrep-results.sarif
          if-no-files-found: ignore

      - name: Upload SARIF results to GitHub
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  trivy:
    name: Trivy Security Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan repository
        uses: ./.github/actions/trivy-sarif
        with:
          scan-type: fs
          scan-ref: "."
          category: trivy
          skip-dirs: "/lib/modules,/boot,/usr/src/kernels,target"

      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: "repo"
          scan-ref: "."
          format: "json"
          output: "trivy-results.json"

      - name: Upload Trivy Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-results
          path: trivy-results.json

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979

  secrets-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog OSS (Pull Request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Schedule)
        if: github.event_name == 'schedule'
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10
        with:
          path: ./
          extra_args: --debug --only-verified

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, semgrep, trivy, secrets-detection]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Create Security Summary
        run: |
          echo "# Security Analysis Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Job Results" >> security-summary.md
          echo "- Cargo Audit: ${{ needs.cargo-audit.result }}" >> security-summary.md
          echo "- Cargo Deny: ${{ needs.cargo-deny.result }}" >> security-summary.md
          echo "- Semgrep: ${{ needs.semgrep.result }}" >> security-summary.md
          echo "- Trivy: ${{ needs.trivy.result }}" >> security-summary.md
          echo "- Secrets Detection: ${{ needs.secrets-detection.result }}" >> security-summary.md

      - name: Upload Security Summary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-summary
          path: security-summary.md
