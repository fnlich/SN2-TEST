name: Security Analysis

on:
  push:
    branches: [main, testnet]
  pull_request:
    branches: [main, testnet]
  schedule:
    - cron: "0 6 * * 1"
  workflow_call: {}

permissions:
  actions: read
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version ${{ env.CARGO_AUDIT_VERSION }} --locked

      - name: Run cargo audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit --json | tee cargo-audit-results.json

      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-audit-results
          path: cargo-audit-results.json

  semgrep:
    name: Semgrep Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: |
          semgrep --config=auto \
            --exclude-rule=javascript.lang.security.detect-insecure-websocket.detect-insecure-websocket \
            --json --output=semgrep-results.json \
            --error

      - name: Generate SARIF report
        if: always()
        run: |
          semgrep --config=auto \
            --exclude-rule=javascript.lang.security.detect-insecure-websocket.detect-insecure-websocket \
            --sarif --output=semgrep-results.sarif \
            || true

      - name: Upload Semgrep Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-results
          path: |
            semgrep-results.json
            semgrep-results.sarif
          if-no-files-found: ignore

      - name: Upload SARIF results to GitHub
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  trivy:
    name: Trivy Security Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Scan repository
        uses: ./.github/actions/trivy-sarif
        with:
          scan-type: fs
          scan-ref: "."
          category: trivy
          skip-dirs: "/lib/modules,/boot,/usr/src/kernels,target"

      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: "repo"
          scan-ref: "."
          format: "json"
          output: "trivy-results.json"

      - name: Upload Trivy Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results
          path: trivy-results.json

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  secrets-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: TruffleHog OSS (Pull Request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Schedule)
        if: github.event_name == 'schedule'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Release gate)
        if: github.event_name == 'workflow_call'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          extra_args: --debug --only-verified

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, semgrep, trivy, secrets-detection]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Create Security Summary
        run: |
          echo "# Security Analysis Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Job Results" >> security-summary.md
          echo "- Cargo Audit: ${{ needs.cargo-audit.result }}" >> security-summary.md
          echo "- Cargo Deny: ${{ needs.cargo-deny.result }}" >> security-summary.md
          echo "- Semgrep: ${{ needs.semgrep.result }}" >> security-summary.md
          echo "- Trivy: ${{ needs.trivy.result }}" >> security-summary.md
          echo "- Secrets Detection: ${{ needs.secrets-detection.result }}" >> security-summary.md

      - name: Upload Security Summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-summary
          path: security-summary.md
