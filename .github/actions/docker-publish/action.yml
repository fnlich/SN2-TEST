name: Docker Build and Publish
description: Set up Docker Buildx, authenticate, extract metadata, build and push image

inputs:
  registry:
    description: Container registry
    required: true
  username:
    description: Registry username
    required: true
  password:
    description: Registry password or token
    required: true
  images:
    description: Image name for metadata generation
    required: true
  context:
    description: Docker build context
    default: "."
  file:
    description: Path to Dockerfile
    default: "./Dockerfile"
  target:
    description: Docker build target stage
    default: ""
  tags:
    description: Image tags (newline-separated)
    required: true
  push:
    description: Push image to registry
    default: "true"
  pull:
    description: Pull base images before build
    default: "false"
  build-args:
    description: Build arguments (newline-separated)
    default: ""
  cache-from:
    description: Cache source
    default: ""
  cache-to:
    description: Cache destination
    default: ""

outputs:
  digest:
    description: Image digest
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to container registry
      if: inputs.push == 'true'
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ inputs.images }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        target: ${{ inputs.target }}
        push: ${{ inputs.push }}
        pull: ${{ inputs.pull }}
        tags: ${{ inputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: ${{ inputs.cache-from }}
        cache-to: ${{ inputs.cache-to }}
